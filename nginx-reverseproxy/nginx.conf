events {}

http {
  # WebSocket upgrade helper (standard pattern).
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name tunnel.local;

    location / {
      proxy_pass http://host.docker.internal:4001;
      proxy_http_version 1.1;

      # Required for WebSockets.
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Usual reverse-proxy headers.
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Avoid idle WS disconnects (tune as desired).
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
  
  # Per-tunnel server blocks (written by core-api on POST api/tunnels/register).
  include /etc/nginx/tunnels/*.conf;
}

